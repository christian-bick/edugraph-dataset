name: Release Dataset to HuggingFace

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Disable AppArmor for Playwright/Chromium
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Start local server
        run: npm run dev &

      - name: Generate Dataset
        run: npm run generate:dataset

      - name: Audit VQA Validation Cache (Zero Cost)
        run: npm run validate:dataset -- --audit

      - name: Generate Coverage Report
        run: npm run report:coverage

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Copy license and HF_README (as README) so they are included in the HF repo
          cp LICENSE out/dataset/
          cp HF_README.md out/dataset/README.md
          
          # Clean up intermediate .metadata.jsonl files
          find out/dataset -name ".metadata.jsonl" -delete

          # Install huggingface_hub
          pip install -U huggingface_hub
          
          # Push the dataset folder to the HF repo main branch and delete stale remote files
          hf upload christian-bick/edugraph-exercises ./out/dataset . --repo-type dataset --delete="*"

          # Tag the revision on HF to match the GitHub tag
          hf repo tag create christian-bick/edugraph-exercises ${{ github.ref_name }} --repo-type dataset
